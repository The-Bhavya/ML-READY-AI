<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-brand {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        /* Full page centered layout */
        .login-wrapper {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            background: linear-gradient(135deg, #f8f9fa 0%, #fff8e1 100%);
        }

        .form-card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.10);
            padding: 44px 48px;
        }

        .card-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(45deg, #ffc107, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 4px 16px rgba(255, 193, 7, 0.35);
        }

        .divider {
            border-top: 1px solid #e9ecef;
            margin: 10px 0 24px;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            border-color: #ffc107;
            box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
            background: white;
        }

        .btn-login {
            background: linear-gradient(45deg, #ffc107, #ff8c00);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
        }

        .valid-feedback,
        .invalid-feedback {
            display: block;
        }

        @media (max-width: 576px) {
            .form-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/login"><i class="fas fa-sign-in-alt mr-1"></i>Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/register"><i class="fas fa-user-plus mr-1"></i>Register</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Centered Form Wrapper -->
    <div class="login-wrapper">
        <div class="form-card">

            <!-- Icon + Heading -->
            <div class="text-center mb-4">
                <div class="card-icon">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h3 class="font-weight-bold text-dark mb-1">Welcome Back</h3>
                <p class="text-muted mb-0">Sign in to your account to continue</p>
            </div>

            <div class="divider"></div>

            <!-- Flash messages placeholder -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="post" id="loginForm" novalidate>

                <!-- Email -->
                <div class="form-group">
                    <label class="font-weight-bold">
                        <i class="fas fa-envelope mr-2 text-warning"></i>Email
                    </label>
                    <input name="email" id="email" type="email" class="form-control"
                        placeholder="Enter your email" required>
                    <div class="invalid-feedback" id="emailError"></div>
                    <div class="valid-feedback" id="emailSuccess"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="font-weight-bold">
                        <i class="fas fa-lock mr-2 text-warning"></i>Password
                    </label>
                    <input name="password" id="password" type="password" class="form-control"
                        placeholder="Enter your password" required>
                    <div class="invalid-feedback" id="passwordError"></div>
                    <div class="valid-feedback" id="passwordSuccess"></div>
                </div>

                <!-- Remember Me -->
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
                    </div>
                </div>

                <!-- Submit -->
                <div class="mt-2">
                    <button type="submit" class="btn btn-warning btn-login text-dark" id="submitBtn">
                        <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                    </button>
                </div>

                <div class="text-center mt-3">
                    <p class="text-muted mb-0">Don't have an account?
                        <a href="/register" class="text-warning font-weight-bold">Sign Up</a>
                    </p>
                </div>

            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#email').on('input', validateEmail);
            $('#password').on('input', validatePassword);

            $('#loginForm').on('submit', function (e) {
                e.preventDefault();
                if (validateForm()) this.submit();
            });

            function validateEmail() {
                const email = $('#email').val().trim();
                if (!email.length) { hideValidation('email'); return false; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError('email', 'Please enter a valid email address');
                showSuccess('email', 'Email format is valid'); return true;
            }

            function validatePassword() {
                const pw = $('#password').val();
                if (!pw.length) { hideValidation('password'); return false; }
                if (pw.length < 6) return showError('password', 'Password must be at least 6 characters long');
                showSuccess('password', 'Password looks good'); return true;
            }

            function validateForm() {
                return validateEmail() & validatePassword();
            }

            function showError(field, message) {
                $(`#${field}`).addClass('is-invalid').removeClass('is-valid');
                $(`#${field}Error`).text(message).show();
                $(`#${field}Success`).hide();
                return false;
            }

            function showSuccess(field, message) {
                $(`#${field}`).addClass('is-valid').removeClass('is-invalid');
                $(`#${field}Success`).text(message).show();
                $(`#${field}Error`).hide();
                return true;
            }

            function hideValidation(field) {
                $(`#${field}`).removeClass('is-valid is-invalid');
                $(`#${field}Error, #${field}Success`).hide();
            }
        });
    </script>
</body>

</html>
